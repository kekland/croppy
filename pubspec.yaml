name: croppy
description: A fully customizable image cropper for Flutter. Mobile-first, but supports Web and Desktop platforms.
version: 1.5.2
homepage: https://github.com/kekland/croppy

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  cassowary: ^0.4.3

  # ffi/native assets
  ffi: ^2.2.0
  code_assets: ^1.0.0
  hooks: ^1.0.0
  native_toolchain_c: ^0.17.6
  logging: ^1.3.0

  cupertino_icons: ^1.0.8
  equatable: ^2.0.5
  vector_math: ^2.1.4
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  ffigen: ^20.1.1

flutter:
  plugin:
    platforms:
      web:
